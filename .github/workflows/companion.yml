name: Companion

# CI for the self-hosted Companion (companion/). Two gates first — type-check the web
# bundle and test the server — then, only if both pass, build the Docker image and run
# the container to confirm it actually serves /healthz under its hardened settings.
#
# Path-filtered so it only runs when companion code (or this workflow) changes; the
# Android app build lives in build.yml.

on:
  push:
    branches: ["**"]
    paths:
      - "companion/**"
      - ".github/workflows/companion.yml"
  pull_request:
    paths:
      - "companion/**"
      - ".github/workflows/companion.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: companion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: companion/web/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs svelte-check (type-check) and then the Vite production build.
      - name: Type-check + build
        run: pnpm build

      - name: Unit tests (crypto + instrument honesty gate + tasks)
        run: pnpm test:unit

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: companion-web-dist
          path: companion/web/dist
          if-no-files-found: error

  server:
    name: Server — test + jar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion/server
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --stacktrace

      - name: Build fat jar
        run: ./gradlew shadowJar --stacktrace

      - name: Upload server jar
        uses: actions/upload-artifact@v7
        with:
          name: companion-server-jar
          path: companion/server/build/libs/daymark-companion.jar
          if-no-files-found: error

  integration:
    name: Sync integration (real server + crypto)
    runs-on: ubuntu-latest
    needs: [server] # the server job builds the jar this drives
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download server jar
        uses: actions/download-artifact@v4
        with:
          name: companion-server-jar
          path: companion/server/build/libs

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: companion/web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: companion/web
        run: pnpm install --frozen-lockfile

      # Boots the jar and round-trips encrypt → PUT → fetch → decrypt through the API.
      - name: Run integration tests
        working-directory: companion/web
        env:
          DAYMARK_SERVER_JAR: ${{ github.workspace }}/companion/server/build/libs/daymark-companion.jar
        run: pnpm test:integration

  docker:
    name: Docker — build image + run /healthz
    runs-on: ubuntu-latest
    needs: [web, server] # only spin up the builder once the checks above pass
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: companion
          file: companion/Dockerfile
          push: false
          load: true
          tags: daymark-companion:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and smoke-test
        run: |
          set -euo pipefail
          # Run under the same hardening the compose file uses: non-root (baked into the
          # image), read-only rootfs + tmpfs /tmp, all caps dropped, no new privileges.
          docker run -d --name companion \
            -p 127.0.0.1:8080:8080 \
            --read-only --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            daymark-companion:ci

          echo "Waiting for the container to become healthy..."
          ok=0
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "::error::container did not answer /healthz in time"
            docker logs companion || true
            exit 1
          fi

          echo "== /healthz =="
          curl -fsS http://127.0.0.1:8080/healthz; echo

          echo "== security header present =="
          curl -fsS -D - -o /dev/null http://127.0.0.1:8080/ \
            | grep -i "content-security-policy: default-src 'self'" \
            || { echo "::error::CSP header missing/incorrect"; exit 1; }

          echo "== app is served =="
          curl -fsS http://127.0.0.1:8080/ | grep -q "Daymark Companion" \
            || { echo "::error::report viewer not served at /"; exit 1; }

          docker rm -f companion >/dev/null
          echo "Container smoke-test passed."
