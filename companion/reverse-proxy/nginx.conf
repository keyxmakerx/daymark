# Daymark Companion behind nginx.
#
# nginx terminates TLS and proxies to the container (companion:8080 on a shared network,
# or 127.0.0.1:8080 if you kept the loopback publish). nginx sets the forwarded headers
# itself; it does NOT pass through client-supplied X-Forwarded-* on a fresh proxy_pass,
# which matches the trust-the-proxy-only posture.

upstream daymark_companion {
    server companion:8080;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name daymark.example.com;

    ssl_certificate     /etc/ssl/daymark/fullchain.pem;
    ssl_certificate_key /etc/ssl/daymark/privkey.pem;

    # HSTS at the terminator (not in the app container).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backups can be a few MiB; allow a sensible request body.
    client_max_body_size 32m;

    location / {
        proxy_pass         http://daymark_companion;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;   # set, not append — drop any client value
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # Liveness (optional external check).
    location = /healthz {
        proxy_pass http://daymark_companion;
        access_log off;
    }
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name daymark.example.com;
    return 308 https://$host$request_uri;
}

# Sub-path: to serve under https://host/daymark, set DAYMARK_BASE_PATH=/daymark and use
#   location /daymark/ { proxy_pass http://daymark_companion; ... }
# (do not strip the prefix — the app expects it).
